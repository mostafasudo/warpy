services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: warpy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - warpy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./.env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-}
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/warpy
      REDIS_URL: redis://redis:6379/0
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}
      WIDGET_JWT_SECRET: ${WIDGET_JWT_SECRET:-}
      TEST_WIDGET_TOKEN_API_KEY: ${TEST_WIDGET_TOKEN_API_KEY:-}
      LEMON_SQUEEZY_API_KEY: ${LEMON_SQUEEZY_API_KEY:-}
      LEMON_SQUEEZY_STORE_ID: ${LEMON_SQUEEZY_STORE_ID:-}
      LEMON_SQUEEZY_WEBHOOK_SECRET: ${LEMON_SQUEEZY_WEBHOOK_SECRET:-}
      LEMON_SQUEEZY_REDIRECT_URL: ${LEMON_SQUEEZY_REDIRECT_URL:-}
      LEMON_SQUEEZY_TEST_MODE: ${LEMON_SQUEEZY_TEST_MODE:-false}
      LEMON_SQUEEZY_BASIC_VARIANT_ID: ${LEMON_SQUEEZY_BASIC_VARIANT_ID:-}
      LEMON_SQUEEZY_PRO_VARIANT_ID: ${LEMON_SQUEEZY_PRO_VARIANT_ID:-}
      LEMON_SQUEEZY_ENTERPRISE_VARIANT_ID: ${LEMON_SQUEEZY_ENTERPRISE_VARIANT_ID:-}
      LEMON_SQUEEZY_TOPUP_1000_VARIANT_ID: ${LEMON_SQUEEZY_TOPUP_1000_VARIANT_ID:-}
      LEMON_SQUEEZY_TOPUP_5000_VARIANT_ID: ${LEMON_SQUEEZY_TOPUP_5000_VARIANT_ID:-}
      LEMON_SQUEEZY_TOPUP_10000_VARIANT_ID: ${LEMON_SQUEEZY_TOPUP_10000_VARIANT_ID:-}
      BILLING_ADMIN_TOKEN: ${BILLING_ADMIN_TOKEN:-}
      USE_GOOD_MODELS: ${USE_GOOD_MODELS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/warpy
      REDIS_URL: redis://redis:6379/0
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}
      WIDGET_JWT_SECRET: ${WIDGET_JWT_SECRET:-}
      TEST_WIDGET_TOKEN_API_KEY: ${TEST_WIDGET_TOKEN_API_KEY:-}
      USE_GOOD_MODELS: ${USE_GOOD_MODELS:-false}
    command:
      [
        "rq",
        "worker",
        "default",
        "--with-scheduler",
        "--url",
        "redis://redis:6379/0",
        "--worker-class",
        "app.workers.no_client_list_worker.NoClientListWorker",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./.env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_API_TIMEOUT_MS: ${VITE_API_TIMEOUT_MS:-5000}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  warpy-postgres-data:
